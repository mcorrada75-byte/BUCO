name: buco
description: App Android per salvare buche con GPS, foto e note.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  intl: ^0.19.0

flutter:
  uses-material-design: true
