workflows:
  android-apk:
    name: Buco Android APK
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Prepara progetto Flutter
        script: |
          flutter create .
          flutter pub get
      - name: Build APK release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
